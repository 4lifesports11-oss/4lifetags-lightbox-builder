const Busboy = require("busboy");

const SHOPIFY_API_VERSION = "2026-04";
const RATE_LIMIT_WINDOW_MS = 60 * 1000;
const RATE_LIMIT_MAX = Number(process.env.UPLOAD_RATE_LIMIT_PER_MINUTE || "10");
const rateBucket = new Map();

function json(statusCode, body) {
  return {
    statusCode,
    headers: {
      "Content-Type": "application/json",
      "Cache-Control": "no-store",
      "X-Content-Type-Options": "nosniff"
    },
    body: JSON.stringify(body)
  };
}

function requireEnv(name) {
  const value = process.env[name];
  if (!value) throw new Error(`Server is missing required configuration: ${name}`);
  return value;
}

function getIp(event) {
  return (
    event.headers["x-nf-client-connection-ip"] ||
    event.headers["client-ip"] ||
    event.headers["x-forwarded-for"] ||
    "unknown"
  ).split(",")[0].trim();
}

function rateLimit(event) {
  const ip = getIp(event);
  const now = Date.now();
  const record = rateBucket.get(ip) || { count: 0, resetAt: now + RATE_LIMIT_WINDOW_MS };

  if (now > record.resetAt) {
    record.count = 0;
    record.resetAt = now + RATE_LIMIT_WINDOW_MS;
  }

  record.count += 1;
  rateBucket.set(ip, record);

  return record.count <= RATE_LIMIT_MAX;
}

function allowedOrigins() {
  return (process.env.ALLOWED_ORIGINS || "")
    .split(",")
    .map((origin) => origin.trim().replace(/\/$/, ""))
    .filter(Boolean);
}

function checkOrigin(event) {
  const allowed = allowedOrigins();

  if (!allowed.length) {
    throw new Error("Server is missing ALLOWED_ORIGINS.");
  }

  const origin = String(event.headers.origin || event.headers.Origin || "").replace(/\/$/, "");
  const referer = String(event.headers.referer || event.headers.Referer || "");

  return allowed.some((allowedOrigin) => origin === allowedOrigin || referer.startsWith(allowedOrigin + "/"));
}

function extensionFromMime(mimeType) {
  const clean = String(mimeType || "").toLowerCase().split(";")[0].trim();
  if (clean === "image/jpeg" || clean === "image/jpg") return ".jpg";
  if (clean === "image/png") return ".png";
  if (clean === "image/webp") return ".webp";
  if (clean === "image/svg+xml") return ".svg";
  return "";
}

function normalizeMime(mimeType, filename) {
  const clean = String(mimeType || "").toLowerCase().split(";")[0].trim();
  if (clean) return clean;

  const name = String(filename || "").toLowerCase();
  if (name.endsWith(".jpg") || name.endsWith(".jpeg")) return "image/jpeg";
  if (name.endsWith(".png")) return "image/png";
  if (name.endsWith(".webp")) return "image/webp";
  if (name.endsWith(".svg")) return "image/svg+xml";
  return "application/octet-stream";
}

function safeFilename(filename, mimeType) {
  const extFromMime = extensionFromMime(mimeType);
  const raw = String(filename || "logo-upload").normalize("NFKD");
  const withoutPath = raw.split(/[\\/]/).pop() || "logo-upload";
  const withoutQuery = withoutPath.split("?")[0].split("#")[0];

  let base = withoutQuery.replace(/\.[A-Za-z0-9]{1,8}$/, "");
  base = base
    .replace(/[^\x20-\x7E]/g, "")
    .replace(/[^A-Za-z0-9._-]+/g, "-")
    .replace(/-+/g, "-")
    .replace(/^[._-]+|[._-]+$/g, "")
    .slice(0, 60);

  if (!base) base = "logo-upload";

  let ext = extFromMime;
  if (!ext) {
    const match = withoutQuery.match(/(\.[A-Za-z0-9]{1,8})$/);
    ext = match ? match[1].toLowerCase() : "";
  }

  if (![".png", ".jpg", ".jpeg", ".webp", ".svg"].includes(ext)) {
    ext = extFromMime || ".png";
  }

  if (ext === ".jpeg") ext = ".jpg";

  // Add timestamp so Shopify never receives duplicate or weird filenames.
  return `${base}-${Date.now()}${ext}`;
}

function isAllowedMime(mimeType) {
  return /^image\/(png|jpe?g|webp|svg\+xml)$/i.test(mimeType || "");
}

function parseMultipart(event) {
  return new Promise((resolve, reject) => {
    const contentType = event.headers["content-type"] || event.headers["Content-Type"];

    if (!contentType) {
      reject(new Error("Missing content-type header."));
      return;
    }

    const busboy = Busboy({
      headers: { "content-type": contentType },
      limits: {
        files: 1,
        fileSize: Number(process.env.MAX_UPLOAD_MB || "10") * 1024 * 1024
      }
    });

    let uploadedFile = null;
    let limitReached = false;

    busboy.on("file", (fieldname, file, info) => {
      const chunks = [];

      const mimeType = normalizeMime(info.mimeType, info.filename);
      const filename = safeFilename(info.filename, mimeType);

      file.on("limit", () => {
        limitReached = true;
        file.resume();
      });

      file.on("data", (chunk) => chunks.push(chunk));

      file.on("end", () => {
        if (limitReached) return;

        uploadedFile = {
          fieldname,
          filename,
          originalFilename: String(info.filename || ""),
          mimeType,
          buffer: Buffer.concat(chunks)
        };
      });
    });

    busboy.on("error", reject);

    busboy.on("finish", () => {
      if (limitReached) {
        reject(new Error(`Logo file is too large. Max size is ${process.env.MAX_UPLOAD_MB || "10"}MB.`));
        return;
      }

      if (!uploadedFile) {
        reject(new Error("No file was uploaded."));
        return;
      }

      resolve(uploadedFile);
    });

    const bodyBuffer = Buffer.from(event.body || "", event.isBase64Encoded ? "base64" : "utf8");
    busboy.end(bodyBuffer);
  });
}

let cachedAdminToken = null;
let cachedAdminTokenExpiresAt = 0;

async function getAdminAccessToken() {
  if (process.env.SHOPIFY_CLIENT_ID && process.env.SHOPIFY_CLIENT_SECRET) {
    const now = Date.now();

    if (cachedAdminToken && now < cachedAdminTokenExpiresAt - 5 * 60 * 1000) {
      return cachedAdminToken;
    }

    const storeDomain = requireEnv("SHOPIFY_STORE_DOMAIN").replace(/^https?:\/\//, "");

    const body = new URLSearchParams();
    body.set("grant_type", "client_credentials");
    body.set("client_id", requireEnv("SHOPIFY_CLIENT_ID"));
    body.set("client_secret", requireEnv("SHOPIFY_CLIENT_SECRET"));

    const response = await fetch(`https://${storeDomain}/admin/oauth/access_token`, {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body
    });

    const data = await response.json();

    if (!response.ok || !data.access_token) {
      console.error("Shopify token request failed:", JSON.stringify(data, null, 2));
      throw new Error("Shopify Admin access could not be created.");
    }

    cachedAdminToken = data.access_token;
    cachedAdminTokenExpiresAt = Date.now() + Number(data.expires_in || 86399) * 1000;
    return cachedAdminToken;
  }

  return requireEnv("SHOPIFY_ADMIN_ACCESS_TOKEN");
}

async function shopifyAdmin(query, variables) {
  const storeDomain = requireEnv("SHOPIFY_STORE_DOMAIN").replace(/^https?:\/\//, "");
  const token = await getAdminAccessToken();

  const response = await fetch(`https://${storeDomain}/admin/api/${SHOPIFY_API_VERSION}/graphql.json`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-Shopify-Access-Token": token
    },
    body: JSON.stringify({ query, variables })
  });

  const text = await response.text();
  let data;
  try {
    data = JSON.parse(text);
  } catch (error) {
    console.error("Shopify Admin returned non-JSON:", response.status, text.slice(0, 500));
    throw new Error("Shopify Admin returned an invalid response.");
  }

  if (!response.ok || data.errors) {
    console.error("Shopify Admin GraphQL error:", JSON.stringify(data, null, 2));
    const message = data.errors && data.errors[0] && data.errors[0].message
      ? data.errors[0].message
      : "Shopify file upload failed.";
    throw new Error(message);
  }

  return data;
}

function userErrorMessage(errors) {
  if (!errors || !errors.length) return "";
  return errors.map((e) => {
    const field = Array.isArray(e.field) ? e.field.join(".") : e.field || "";
    return field ? `${field}: ${e.message}` : e.message;
  }).join(", ");
}

async function createStagedTarget(file) {
  const mutation = `
    mutation stagedUploadsCreate($input: [StagedUploadInput!]!) {
      stagedUploadsCreate(input: $input) {
        stagedTargets {
          url
          resourceUrl
          parameters {
            name
            value
          }
        }
        userErrors {
          field
          message
        }
      }
    }
  `;

  // FILE is the safest resource for creating a Shopify Files entry with fileCreate.
  // PRODUCT_IMAGE can produce "String did not match the expected pattern" when used with fileCreate.
  const resourcesToTry = ["FILE", "IMAGE"];
  let lastError = "";

  for (const resource of resourcesToTry) {
    const data = await shopifyAdmin(mutation, {
      input: [
        {
          filename: file.filename,
          mimeType: file.mimeType,
          httpMethod: "POST",
          resource
        }
      ]
    });

    const payload = data.data.stagedUploadsCreate;
    const message = userErrorMessage(payload.userErrors);

    if (!message && payload.stagedTargets && payload.stagedTargets[0]) {
      return { target: payload.stagedTargets[0], resource };
    }

    lastError = message || `Shopify did not create a staged upload target for resource ${resource}.`;
    console.error(`stagedUploadsCreate failed using resource ${resource}:`, lastError);
  }

  throw new Error(lastError || "Shopify could not create an upload target.");
}

async function uploadToStagedTarget(target, file) {
  const form = new FormData();

  target.parameters.forEach((param) => {
    form.append(param.name, param.value);
  });

  // The file must be appended last for Shopify staged uploads.
  form.append("file", new Blob([file.buffer], { type: file.mimeType }), file.filename);

  const response = await fetch(target.url, {
    method: "POST",
    body: form
  });

  if (!response.ok) {
    const text = await response.text();
    console.error("Staged upload failed:", response.status, text);
    throw new Error("Could not upload file to Shopify storage.");
  }
}

function fileContentType(file) {
  // SVGs can be rejected as MediaImage on some Shopify stores, so store them as generic files.
  if (file.mimeType === "image/svg+xml") return "GENERIC_FILE";
  return "IMAGE";
}

async function createShopifyFile(target, file) {
  const mutation = `
    mutation fileCreate($files: [FileCreateInput!]!) {
      fileCreate(files: $files) {
        files {
          id
          fileStatus
          alt
          createdAt
          ... on MediaImage {
            image {
              url
            }
          }
          ... on GenericFile {
            url
          }
        }
        userErrors {
          field
          message
        }
      }
    }
  `;

  const data = await shopifyAdmin(mutation, {
    files: [
      {
        alt: file.filename,
        contentType: fileContentType(file),
        originalSource: target.resourceUrl
      }
    ]
  });

  const payload = data.data.fileCreate;
  const message = userErrorMessage(payload.userErrors);

  if (message) {
    console.error("fileCreate userErrors:", message, {
      filename: file.filename,
      mimeType: file.mimeType,
      resourceUrl: target.resourceUrl
    });

    if (/expected pattern/i.test(message)) {
      throw new Error("Shopify rejected the logo file name or upload URL pattern. Please rename the file using only letters and numbers, then try again.");
    }

    throw new Error(message);
  }

  if (!payload.files || !payload.files[0]) {
    throw new Error("Shopify did not return the uploaded file.");
  }

  return payload.files[0];
}

function sleep(ms) {
  return new Promise((resolve) => setTimeout(resolve, ms));
}

async function getShopifyFilePublicUrl(fileId) {
  const query = `
    query getFile($id: ID!) {
      node(id: $id) {
        ... on MediaImage {
          id
          fileStatus
          image {
            url
          }
        }
        ... on GenericFile {
          id
          fileStatus
          url
        }
      }
    }
  `;

  for (let attempt = 0; attempt < 8; attempt += 1) {
    const data = await shopifyAdmin(query, { id: fileId });
    const node = data.data && data.data.node ? data.data.node : null;
    const mediaUrl = node && node.image && node.image.url ? node.image.url : "";
    const genericUrl = node && node.url ? node.url : "";
    const url = mediaUrl || genericUrl;

    if (url) {
      return url;
    }

    await sleep(1000);
  }

  return "";
}

exports.handler = async (event) => {
  try {
    if (event.httpMethod !== "POST") {
      return json(405, { error: "Method not allowed" });
    }

    if (!checkOrigin(event)) {
      return json(403, { error: "Request blocked." });
    }

    if (!rateLimit(event)) {
      return json(429, { error: "Too many uploads. Please wait a minute and try again." });
    }

    const file = await parseMultipart(event);

    if (!isAllowedMime(file.mimeType)) {
      return json(400, { error: "Please upload a PNG, JPG, WEBP, or SVG logo file." });
    }

    if (!file.buffer || !file.buffer.length) {
      return json(400, { error: "The uploaded file was empty. Please choose a real image file." });
    }

    const staged = await createStagedTarget(file);
    await uploadToStagedTarget(staged.target, file);
    const createdFile = await createShopifyFile(staged.target, file);
    const publicUrl = await getShopifyFilePublicUrl(createdFile.id);

    return json(200, {
      fileId: createdFile.id,
      status: createdFile.fileStatus,
      url: publicUrl || "",
      filename: file.filename,
      originalFilename: file.originalFilename || "",
      stagedResource: staged.resource,
      message: publicUrl ? "Logo uploaded and public image URL is ready." : "Logo uploaded, but Shopify is still processing the preview URL."
    });
  } catch (error) {
    console.error("Upload logo error:", error);

    const raw = String(error.message || "");
    const safeMessage =
      raw.startsWith("Server is missing") ||
      raw.includes("too large") ||
      raw.includes("Please upload") ||
      raw.includes("rename the file") ||
      raw.includes("empty") ||
      raw.includes("Request blocked")
        ? raw
        : "Logo upload failed. Please rename the file using only letters and numbers, then try again.";

    return json(500, { error: safeMessage });
  }
};
